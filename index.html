<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>11/9 Asistencia y Pagos</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --amarillo: #F5C400; --fondo: #1A1A1A; --sup: #242424;
            --borde: #3A3A3A; --texto: #F0EDE4; --verde: #3DB85A; --rojo: #E24B4A;
            --gris: #888; --azul: #007799; --naranja: #FF8800; --purpura: #8A2BE2; --rosa: #E91E63;
        }
        html, body { background: var(--fondo); color: var(--texto); font-family: -apple-system, sans-serif; height: 100%; margin: 0; }
        
        #header-fijo { position: absolute; top: 0; left: 0; right: 0; background: var(--sup); z-index: 100; border-bottom: 2px solid var(--borde); }
        
        .controles { display: flex; gap: 2px; padding: 6px 4px; width: 100%; box-sizing: border-box; }
        .btn-acc { flex: 1; border: none; padding: 8px 0; border-radius: 4px; font-size: 7.5px; font-weight: 900; text-transform: uppercase; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; }
        
        .btn-web { background: var(--amarillo); color: #1A1A1A; }
        .btn-pdf-dia { background: var(--gris); }
        .btn-pdf-sem { background: var(--azul); }
        .btn-pdf-rec { background: var(--rosa); }
        .btn-pdf-mes { background: var(--naranja); }
        .btn-pdf-prem { background: var(--purpura); }
        
        .nav-sem { display: flex; align-items: center; padding: 0 15px; background: #2E2E2E; justify-content: space-between; height: 40px; }
        .tit-periodo { font-size: 11px; font-weight: bold; color: var(--amarillo); }
        .grid-header { display: grid; grid-template-columns: 85px repeat(7, 1fr); background: var(--sup); border-top: 1px solid var(--borde); }
        .d-col { text-align: center; padding: 6px 0; font-size: 9px; font-weight: 700; color: #888; border-left: 1px solid #2a2a2a; }
        
        #scroll-area { position: absolute; top: 135px; bottom: 0; left: 0; right: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .fila { display: grid; grid-template-columns: 85px repeat(7, 1fr); border-bottom: 1px solid var(--borde); align-items: center; padding: 5px 0; }
        .nom { font-size: 10px; font-weight: 600; padding-left: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .btn-est { width: 32px; height: 32px; border-radius: 5px; border: none; background: #2E2E2E; color: #444; font-size: 11px; cursor: pointer; }
        .btn-est.presente, .btn-est.horas { background: rgba(61,184,90,0.25); color: var(--verde); border: 1px solid var(--verde); }
        .btn-est.ausente { background: rgba(226,75,74,0.25); color: var(--rojo); border: 1px solid var(--rojo); }
        
        #fab { position: fixed; bottom: 25px; right: 20px; width: 55px; height: 55px; background: var(--amarillo); border-radius: 50%; border: none; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; z-index: 1000; }
        #fab span { width: 22px; height: 3px; background: #1A1A1A; border-radius: 2px; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        .overlay-content { background: var(--sup); width: 90%; max-width: 380px; padding: 25px; border-radius: 15px; border: 1px solid var(--borde); box-sizing: border-box; }
        
        .tabs-header { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--sup); padding: 10px; gap: 4px; width: 100%; border-bottom: 1px solid var(--borde); box-sizing: border-box; }
        .tab-btn { padding: 10px 0; border: none; border-radius: 5px; background: #333; color: #888; font-size: 8px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--amarillo); color: #1A1A1A; }
        .tab-container { flex: 1; width: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        input[type="date"], input[type="number"], input[type="text"] { background: #111; border: 1px solid var(--borde); color: white; padding: 10px; width: 100%; box-sizing: border-box; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        td, th { padding: 12px 8px; border-bottom: 1px solid #333; text-align: left; }
        .t-total { font-weight: bold; color: #007799 !important; background-color: #e0f7fa !important; }
        
        #sync-status { position: fixed; top: 5px; right: 8px; font-size: 9px; font-weight: bold; z-index: 200; padding: 2px 6px; border-radius: 4px; }
        #sync-status.ok { background: rgba(61,184,90,0.3); color: var(--verde); }
        #sync-status.error { background: rgba(226,75,74,0.3); color: var(--rojo); }
        #sync-status.loading { background: rgba(245,196,0,0.3); color: var(--amarillo); }
 
        .premio-label { font-size: 11px; color: #aaa; margin-bottom: 5px; margin-top: 14px; display: block; }
        .premio-row-config { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-premio-gen { background: var(--purpura); color: white; border: none; border-radius: 6px; width: 100%; padding: 13px 0; font-weight: 900; font-size: 11px; cursor: pointer; margin-top: 12px; text-transform: uppercase; }
        .premio-table th { background: #1e1e1e; color: #aaa; font-size: 10px; padding: 8px 5px; border-bottom: 1px solid #333; }
        .premio-table td { font-size: 11px; padding: 8px 5px; border-bottom: 1px solid #2a2a2a; }
    </style>
</head>
<body>
    <div id="sync-status" class="loading">Conectando...</div>
    
    <div id="header-fijo">
        <div class="controles">
            <button class="btn-acc btn-web" onclick="guardarWeb()">Guardar</button>
            <button class="btn-acc btn-pdf-dia" onclick="abrirSelectorAnio()">Anual</button>
            <button class="btn-acc btn-pdf-sem" onclick="generarPDF('semanal')">Semanal</button>
            <button class="btn-acc btn-pdf-rec" onclick="abrirSelectorRecibos()">Recibos</button>
            <button class="btn-acc btn-pdf-mes" onclick="generarPDF('mensual')">Mensual</button>
            <button class="btn-acc btn-pdf-prem" onclick="abrirSelectorPremios()">Premios</button>
        </div>
        <div class="nav-sem">
            <button onclick="moverSem(-1)" style="background: none; border: none; color:white; font-size: 24px; cursor: pointer;">&#8249;</button>
            <div id="tit-sem" class="tit-periodo"></div>
            <button onclick="moverSem(1)" style="background: none; border:none; color: white; font-size: 24px; cursor: pointer;">&#8250;</button>
        </div>
        <div class="grid-header" id="dias-h"></div>
    </div>
 
    <div id="scroll-area"><div id="lista"></div></div>
    
    <button id="fab" onclick="abrirMenu()"><span></span><span></span><span></span></button>

    <div class="overlay" id="recibos-overlay">
        <div class="overlay-content" style="max-width: 420px; padding: 20px;">
            <h3 style="margin-top:0; color: var(--rosa); text-transform: uppercase;">Generar Recibos</h3>
            <p style="font-size:11px; color:#aaa; margin-bottom: 15px;">Seleccioná para quién querés generar el recibo:</p>
            <div id="lista-selector-recibos" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px; background: #1a1a1a; border-radius: 8px; border: 1px solid #333;"></div>
            <button class="btn-acc" style="background: var(--verde); color: white; width:100%; height: 45px; font-size:12px;" onclick="generarRecibosPDF()">CREAR PDF DE RECIBOS</button>
            <button onclick="document.getElementById('recibos-overlay').style.display='none'" style="width: 100%; background:none; border:none; color:#aaa; margin-top:15px; cursor:pointer; font-weight:bold;">CANCELAR</button>
        </div>
    </div>
 
    <div class="overlay" id="anio-overlay">
        <div class="overlay-content">
            <h3 style="margin-top:0; color: var(--amarillo)">Generar Reporte Anual</h3>
            <p style="font-size:11px; color:#aaa; margin-bottom: 10px;">Ingresá el año para totalizar:</p>
            <input type="number" id="input-anio-pdf" placeholder="Ej: 2026">
            <button class="btn-acc" style="background: var(--verde); color: white; width:100%; height: 45px; margin-top:15px" onclick="procesarPDFAnual()">GENERAR PDF</button>
            <button onclick="document.getElementById('anio-overlay').style.display='none'" style="width: 100%; background:none; border:none; color:#aaa; margin-top:15px; cursor:pointer;">CANCELAR</button>
        </div>
    </div>

    <div class="overlay" id="premios-overlay">
        <div class="overlay-content" style="max-width: 450px;">
            <h3 style="margin-top:0; color: var(--purpura); text-transform: uppercase; font-size:14px;">🏆 Reporte de Horas Faltantes</h3>
            <div class="premio-row-config">
                <div><span class="premio-label">Fecha inicio</span><input type="date" id="premio-fecha-ini"></div>
                <div><span class="premio-label">Fecha fin</span><input type="date" id="premio-fecha-fin"></div>
            </div>
            <button class="btn-premio-gen" onclick="calcularPremios()">Calcular y Previsualizar</button>
            <div id="premio-preview" style="display:none; margin-top: 16px; border-radius: 8px; overflow: hidden; border: 1px solid #333; max-height: 250px; overflow-y: auto;"></div>
            <button onclick="document.getElementById('premios-overlay').style.display='none'" style="width: 100%; background:none; border:none; color:#aaa; margin-top:15px; cursor:pointer; font-size:12px;">CERRAR VENTANA</button>
        </div>
    </div>
 
    <div class="overlay" id="menu-overlay">
        <div class="tabs-header">
            <button class="tab-btn active" onclick="verTab(0)">SEMANAL</button>
            <button class="tab-btn" onclick="verTab(1)">MENSUAL</button>
            <button class="tab-btn" onclick="verTab(2)">$/HORA</button>
            <button class="tab-btn" onclick="verTab(3)">PERSONAL</button>
        </div>
        <div class="tab-container" style="background: var(--fondo);">
            <div id="t0" class="tab-content active"></div>
            <div id="t1" class="tab-content"></div>
            <div id="t2" class="tab-content"></div>
            <div id="t3" class="tab-content">
                <h4 style="color:var(--amarillo); margin-top:0;">Agregar Nuevo</h4>
                <input type="text" id="nuevo-nombre" placeholder="Nombre completo">
                <button class="btn-acc" style="background: var(--verde); color: white; width:100%; padding:12px; margin-top: 10px;" onclick="agregarPersonal()">AGREGAR</button>
                <div id="lista-borrar" style="margin-top: 20px"></div>
            </div>
        </div>
        <button onclick="cerrarMenu()" style="position:fixed; bottom: 20px; width:90%; left: 5%; padding: 15px; background: var(--amarillo); border: none; border-radius: 8px; font-weight: bold; cursor:pointer; font-size:12px;">VOLVER A PLANILLA</button>
    </div>
 
    <div class="overlay" id="asistencia-overlay">
        <div class="overlay-content" id="modal-asistencia"></div>
    </div>
 
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcjAZZnfjheX9s9qyZzKdua80aCKlhZrA",
            authDomain: "asistencia-3f.firebaseapp.com",
            projectId: "asistencia-3f",
            storageBucket: "asistencia-3f.firebasestorage.app",
            messagingSenderId: "965527629930",
            appId: "1:965527629930:web:ff0a0680bea61b04b65a13",
            measurementId: "G-SYHE29L9H3",
            databaseURL: "https://asistencia-3f-default-rtdb.firebaseio.com"
        };
 
        let db, docRef;
        const DEFAULT_PERSONAL = ['Adolf', 'Andrs', 'Eleu', 'Gavin', 'Vict', 'Nildo', 'Geron', 'Dario', 'Alberto Manuel'];
        let personal = [...DEFAULT_PERSONAL];
        let asistencia = {};
        let costosConfig = {};
        let semOff = 0;
        let mPers = '', mDk = '';
        const DIAS = ['SA', 'DO', 'LU', 'MA', 'MI', 'JU', 'VI'];
        
        const syncCostos = () => personal.forEach(p => { if(!costosConfig[p]) costosConfig[p] = { valorHora: 0 }; });
 
        function iniciarFirebase() {
            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                docRef = db.ref('obra119/asistencia');
                
                const ultimaSemana = localStorage.getItem('obra119_ultima_semana');
                if (ultimaSemana !== null) semOff = parseInt(ultimaSemana, 10) || 0;
                
                docRef.on('value', snap => {
                    const status = document.getElementById('sync-status');
                    if (snap.exists()) {
                        const data = snap.val();
                        personal = data.personal || [...DEFAULT_PERSONAL];
                        asistencia = data.asistencia || {};
                        costosConfig = data.costosConfig || {};
                        syncCostos();
                        render();
                        status.textContent = 'En línea';
                        status.className = 'ok';
                    } else {
                        docRef.set({ personal: [...DEFAULT_PERSONAL], asistencia: {}, costosConfig: {} });
                        status.textContent = 'En línea';
                        status.className = 'ok';
                    }
                }, err => {
                    const status = document.getElementById('sync-status');
                    status.textContent = 'X Sin conexión';
                    status.className = 'error';
                });
            } else {
                setTimeout(iniciarFirebase, 200);
            }
        }
 
        window.onload = iniciarFirebase;
 
        function guardarWeb() {
            if(!docRef) return;
            const status = document.getElementById('sync-status');
            status.textContent = 'Guardando...';
            status.className = 'loading';
            localStorage.setItem('obra119_ultima_semana', semOff);
            docRef.set({ personal, asistencia, costosConfig })
                .then(() => { status.textContent = 'En línea'; status.className = 'ok'; alert("Datos guardados"); })
                .catch(err => { status.textContent = 'X Error'; status.className = 'error'; });
        }
 
        function guardarSilencioso() {
            localStorage.setItem('obra119_ultima_semana', semOff);
            if(docRef) docRef.set({ personal, asistencia, costosConfig }).catch(console.error);
        }
 
        const gK = d => `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
        function getSabadoPrevio(fecha) {
            let d = new Date(fecha);
            let day = d.getDay(); 
            let diff = (day === 6) ? 0 : -(day + 1);
            d.setDate(d.getDate() + diff);
            return d;
        }

        function render() {
            let sabadoInicial = getSabadoPrevio(new Date());
            sabadoInicial.setDate(sabadoInicial.getDate() + semOff * 7);
            const ds =.map(x => { let d = new Date(sabadoInicial); d.setDate(sabadoInicial.getDate() + x); return d; });
 
            document.getElementById('tit-sem').textContent = `${ds[0].getDate()} ${ds[0].toLocaleString('es', {month: 'short'}).toUpperCase()} al ${ds.getDate()} ${ds.toLocaleString('es', {month: 'short'}).toUpperCase()}`;
            document.getElementById('dias-h').innerHTML = '<div class="d-col"></div>' + ds.map((d,i) => `<div class="d-col">${DIAS[i]}<br><span style="font-size:12px; color:#ddd">${d.getDate()}</span></div>`).join('');
            
            document.getElementById('lista').innerHTML = personal.map(p => `
                <div class="fila">
                    <div class="nom">${p}</div>
                    ${ds.map(d => {
                        const k = gK(d);
                        const v = (asistencia[p] && asistencia[p][k]) ? asistencia[p][k] : { estado: 'vacio', horas: 0 };
                        let ic = v.estado === 'ausente' ? 'X' : (v.horas > 0 ? v.horas + 'h' : '-');
                        let cl = v.estado === 'ausente' ? 'ausente' : (v.horas > 0 ? 'horas' : '');
                        return `<div style="text-align:center"><button class="btn-est ${cl}" onclick="abrirAsis('${p}','${k}')">${ic}</button></div>`;
                    }).join('')}
                </div>
            `).join('');
        }
 
        function abrirAsis(p, dk) {
            mPers = p; mDk = dk;
            const v = (asistencia[p] && asistencia[p][dk]) ? asistencia[p][dk] : { estado: 'vacio', horas: '' };
            document.getElementById('modal-asistencia').innerHTML = `
                <h2 style="text-align:center; color:var(--amarillo)">${p}</h2>
                <input type="number" id="h-in" value="${v.horas}" placeholder="Ej: 9" style="text-align:center; font-size: 18px; margin-bottom: 15px;">
                <button class="btn-acc" style="background: var(--azul); color: white; width: 100%; height: 45px;" onclick="setA('horas')">CARGAR HORAS</button>
                <button class="btn-acc" style="background: var(--rojo); color: white; width: 100%; height: 45px; margin-top: 10px" onclick="setA('ausente')">MARCAR AUSENTE</button>
                <button onclick="document.getElementById('asistencia-overlay').style.display='none'" style="width:100%; background:none; border:none; color:#aaa; margin-top:15px; cursor:pointer;">CERRAR</button>
            `;
            document.getElementById('asistencia-overlay').style.display = 'flex';
        }
 
        function setA(e) {
            let h = parseFloat(document.getElementById('h-in').value) || 0;
            if(!asistencia[mPers]) asistencia[mPers] = {};
            asistencia[mPers][mDk] = { estado: e, horas: h };
            document.getElementById('asistencia-overlay').style.display = 'none';
            render(); guardarSilencioso();
        }
 
        function agregarPersonal() {
            let n = document.getElementById('nuevo-nombre').value.trim();
            if (n && !personal.includes(n)) { personal.push(n); syncCostos(); document.getElementById('nuevo-nombre').value = ''; actualizarTablas(); render(); guardarSilencioso(); }
        }
 
        function borrarPers(p) {
            if(confirm('¿Borrar a ' + p + '?')) { personal = personal.filter(x => x !== p); actualizarTablas(); render(); guardarSilencioso(); }
        }
 
        function abrirMenu() { actualizarTablas(); document.getElementById('menu-overlay').style.display = 'flex'; }
        function cerrarMenu() { document.getElementById('menu-overlay').style.display = 'none'; render(); }
        function verTab(n) {
            document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn')[n].classList.add('active');
            document.getElementById('t'+n).classList.add('active');
        }
 
        function actualizarTablas() {
            let sabadoInicial = getSabadoPrevio(new Date());
            sabadoInicial.setDate(sabadoInicial.getDate() + semOff * 7);
            const dsSem =.map(x => { let d = new Date(sabadoInicial); d.setDate(sabadoInicial.getDate() + x); return gK(d); });
 
            let h0 = '<table><thead><tr style="background: #eee; color: #000;"><th>PERSONAL</th><th style="text-align:center;">ESTADO</th><th style="text-align:center;">HS</th><th>PAGO</th></tr></thead><tbody>';
            let tS = 0;
            personal.forEach(p => {
                let hsT = 0, diasPresente = 0;
                const c = costosConfig[p] || {valorHora: 0};
                dsSem.forEach(k => { if (asistencia[p] && asistencia[p][k] && asistencia[p][k].estado !== 'ausente' && Number(asistencia[p][k].horas) >= 1) { diasPresente++; hsT += Number(asistencia[p][k].horas); } });
                let sub = hsT * (Number(c.valorHora) || 0); tS += sub;
                h0 += `<tr><td style="font-weight:bold">${p}</td><td style="text-align:center; color:${diasPresente > 0 ? '#3DB85A' : '#E24B4A'}; font-weight:bold;">${diasPresente > 0 ? 'Presente ('+diasPresente+'d)' : 'Ausente'}</td><td style="text-align:center;">${hsT} h</td><td>$${sub.toLocaleString('es-AR')}</td></tr>`;
            });
            document.getElementById('t0').innerHTML = h0 + `</tbody><tfoot><tr class="t-total"><td colspan="3">TOTAL SEMANA</td><td>$${tS.toLocaleString('es-AR')}</td></tr></tfoot></table>`;
 
            let mesAct = sabadoInicial.getMonth(), anoAct = sabadoInicial.getFullYear();
            let curMes = new Date(anoAct, mesAct, 1);
            const finMes = new Date(anoAct, mesAct + 1, 0);
            const fechasMes = [];
            while (curMes <= finMes) { fechasMes.push(gK(curMes)); curMes.setDate(curMes.getDate() + 1); }
 
            let h1 = '<table><thead><tr style="background: #eee; color: #000;"><th>PERSONAL</th><th style="text-align:center;">ESTADO</th><th style="text-align:center;">HS</th><th>PAGO</th></tr></thead><tbody>';
            let tM = 0;
            personal.forEach(p => {
                let hsM = 0, diasPresenteMes = 0;
                const c = costosConfig[p] || {valorHora: 0};
                fechasMes.forEach(k => { if (asistencia[p] && asistencia[p][k] && asistencia[p][k].estado !== 'ausente' && Number(asistencia[p][k].horas) >= 1) { diasPresenteMes++; hsM += Number(asistencia[p][k].horas); } });
                let sub = hsM * (Number(c.valorHora) || 0); tM += sub;
                h1 += `<tr><td style="font-weight:bold">${p}</td><td style="text-align:center; color:${diasPresenteMes > 0 ? '#3DB85A' : '#E24B4A'}; font-weight:bold;">${diasPresenteMes > 0 ? 'Presente ('+diasPresenteMes+'d)' : 'Ausente'}</td><td style="text-align:center;">${hsM} h</td><td>$${sub.toLocaleString('es-AR')}</td></tr>`;
            });
            document.getElementById('t1').innerHTML = h1 + `</tbody><tfoot><tr class="t-total"><td colspan="3">TOTAL MES</td><td>$${tM.toLocaleString('es-AR')}</td></tr></tfoot></table>`;
 
            let h2 = '<table><thead><tr style="background: #eee; color: #000;"><th>PERSONAL</th><th>$/HORA</th></tr></thead><tbody>';
            personal.forEach(p => { const c = costosConfig[p] || {valorHora:0}; h2 += `<tr><td>${p}</td><td><input type="number" value="${c.valorHora}" onchange="costosConfig['${p}'].valorHora = Number(this.value) || 0; guardarSilencioso()"></td></tr>`; });
            document.getElementById('t2').innerHTML = h2 + '</tbody></table>';
            actualizarListaBorrar();
        }
 
        function actualizarListaBorrar() {
            document.getElementById('lista-borrar').innerHTML = '<h4 style="color: #aaa;">Borrar Personal</h4>' + personal.map(p => `<div style="display:flex; justify-content:space-between; padding:10px; background:#222; margin-bottom:5px; border-radius:5px;"><span>${p}</span><button onclick="borrarPers('${p}')" style="background:var(--rojo); border:none; color:white; padding:5px 10px; border-radius:3px; cursor:pointer;">Borrar</button></div>`).join('');
        }

        function abrirSelectorRecibos() {
            let sabadoInicial = getSabadoPrevio(new Date()); sabadoInicial.setDate(sabadoInicial.getDate() + semOff * 7);
            const dsSem =.map(x => { let d = new Date(sabadoInicial); d.setDate(sabadoInicial.getDate() + x); return gK(d); });
            let ops = '';
            personal.forEach(p => {
                let hsT = 0; const c = costosConfig[p] || {valorHora: 0};
                dsSem.forEach(k => { if(asistencia[p] && asistencia[p][k] && asistencia[p][k].estado !== 'ausente') hsT += Number(asistencia[p][k].horas || 0); });
                let total = hsT * (Number(c.valorHora) || 0);
                ops += `<label style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333; cursor:pointer;"><span><input type="checkbox" class="chk-recibo" value="${p}" data-monto="${total}" ${total > 0 ? 'checked' : ''}> <span style="margin-left:8px; color:white; font-weight:bold;">${p}</span></span><span style="color:var(--verde);">$${total.toLocaleString('es-AR')}</span></label>`;
            });
            document.getElementById('lista-selector-recibos').innerHTML = ops;
            document.getElementById('recibos-overlay').style.display = 'flex';
        }

        // --- CORRECCIÓN INTEGRADA AQUÍ: ESTILOS INLINE FORZADOS ---
        function generarRecibosPDF() {
            const seleccionados = Array.from(document.querySelectorAll('.chk-recibo:checked'));
            if(seleccionados.length === 0) { alert('Seleccioná a alguien'); return; }
            let sabadoInicial = getSabadoPrevio(new Date()); sabadoInicial.setDate(sabadoInicial.getDate() + semOff * 7);
            let v = new Date(sabadoInicial); v.setDate(sabadoInicial.getDate() + 6);
            let fV = `${v.getDate().toString().padStart(2,'0')}/${(v.getMonth()+1).toString().padStart(2,'0')}/${v.getFullYear()}`;
            
            const contenedor = document.createElement('div');
            contenedor.style.backgroundColor = '#ffffff';
            contenedor.style.color = '#000000';
            contenedor.style.padding = '20px';
            contenedor.style.fontFamily = 'Arial, sans-serif';
            let html = '';
            
            seleccionados.forEach((chk, i) => {
                let monto = parseFloat(chk.getAttribute('data-monto')).toLocaleString('es-AR', {minimumFractionDigits:2});
                html += `
                    <div style="width: 100%; border: 2px solid #000000; padding: 20px; margin-bottom: 20px; box-sizing: border-box; page-break-inside: avoid; background: #ffffff; color: #000000;">
                        <div style="text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; color: #000000;">Recibo de Dinero</div>
                        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 15px; color: #000000;">
                            <span><b>Fecha:</b> ${fV}</span>
                            <span><b>De:</b> IIBR Ingeniería SRL</span>
                        </div>
                        <div style="margin-bottom: 10px; font-size: 14px; color: #000000;">
                            <b>Nombre:</b> <span style="border-bottom: 1px solid #000; font-weight: bold;">${chk.value}</span>
                        </div>
                        <div style="margin-bottom: 10px; font-size: 14px; color: #000000;">
                            <b>La suma de:</b> $ <span style="border-bottom: 1px solid #000; font-weight: bold;">${monto}</span>
                        </div>
                        <div style="margin-bottom: 25px; font-size: 14px; color: #000000;">
                            <b>Concepto:</b> <span style="border-bottom: 1px solid #000; font-weight: bold;">Mano de obra - Obra 11 de Septiembre</span>
                        </div>
                        <table style="width: 100%; margin-top: 20px; font-size: 12px; color: #000000;">
                            <tr>
                                <td style="border-top: 1px solid #000; text-align: center; width: 45%; padding-top: 5px;">Firma</td>
                                <td style="width: 10%;"></td>
                                <td style="border-top: 1px solid #000; text-align: center; width: 45%; padding-top: 5px;">DNI</td>
                            </tr>
                        </table>
                    </div>
                `;
                if((i+1)%4 === 0) html += '<div style="page-break-after:always;"></div>';
            });
            contenedor.innerHTML = html; 
            document.getElementById('recibos-overlay').style.display = 'none';
            const opt = { filename: `Recibos_${fV.replace(/\//g,'-')}.pdf`, jsPDF: {format: 'a4'}, html2canvas: {scale: 2, backgroundColor: '#ffffff'} };
            html2pdf().set(opt).from(contenedor).save();
        }

        function abrirSelectorAnio() { document.getElementById('input-anio-pdf').value = new Date().getFullYear(); document.getElementById('anio-overlay').style.display = 'flex'; }
        
        function procesarPDFAnual() {
            const anio = document.getElementById('input-anio-pdf').value; if(!anio) return;
            document.getElementById('anio-overlay').style.display = 'none';
            const cont = document.createElement('div');
            let html = `<h2>Reporte Anual ${anio}</h2><table><tr><th>PERSONAL</th><th>DÍAS</th><th>PAGO</th></tr>`;
            personal.forEach(p => {
                let hsT = 0, dias = 0, c = costosConfig[p] || {valorHora:0};
                for(let m=0; m<12; m++) {
                    let fin = new Date(anio, m+1, 0).getDate();
                    for(let d=1; d<=fin; d++) {
                        let k = gK(new Date(anio, m, d));
                        if(asistencia[p] && asistencia[p][k] && asistencia[p][k].estado !== 'ausente') { dias++; hsT += Number(asistencia[p][k].horas || 0); }
                    }
                }
                html += `<tr><td>${p}</td><td>${dias}</td><td>$${(hsT * c.valorHora).toLocaleString('es-AR')}</td></tr>`;
            });
            cont.innerHTML = html + '</table>'; ejecutarExportacionPDF(cont, `anual_${anio}.pdf`);
        }

        function abrirSelectorPremios() { document.getElementById('premios-overlay').style.display = 'flex'; }
        function calcularPremios() {
            const ini = document.getElementById('premio-fecha-ini').value, fin = document.getElementById('premio-fecha-fin').value;
            if(!ini || !fin) return;
            let fechas = [], cur = new Date(ini+'T12:00:00'), f = new Date(fin+'T12:00:00');
            while(cur <= f) { fechas.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
            let datos = personal.map(p => {
                let faltas = 0, hsT = 0, c = costosConfig[p] || {valorHora: 0};
                fechas.forEach(d => {
                    let k = gK(d), r = asistencia[p] && asistencia[p][k];
                    if(r && r.estado !== 'ausente') { hsT += Number(r.horas || 0); faltas += Math.max(0, 9-Number(r.horas || 0)); } else { faltas += 9; }
                });
                return { nombre: p, faltas, monto: hsT * c.valorHora };
            });
            let filas = datos.map(d => `<tr><td>${d.nombre}</td><td>${d.faltas}h</td><td>$${Math.round(d.monto).toLocaleString('es-AR')}</td></tr>`).join('');
            document.getElementById('premio-preview').innerHTML = `<table><tr><th>PERSONAL</th><th>FALTAS</th><th>TOTAL</th></tr>${filas}</table><button onclick="generarPDFPremios('${ini}','${fin}')" style="width:100%; padding:10px; background:var(--purpura); color:white; border:none; margin-top:10px;">BAJAR PDF</button>`;
            document.getElementById('premio-preview').style.display = 'block';
        }
        function generarPDFPremios(ini, fin) { ejecutarExportacionPDF(document.getElementById('premio-preview'), `premios_${ini}_${fin}.pdf`); }

        function generarPDF(tipo) {
            actualizarTablas();
            let origenId = tipo === 'semanal' ? 't0' : 't1';
            let titulo = tipo === 'semanal' ? 'Reporte Semanal' : 'Reporte Mensual';
            const contenedor = document.createElement('div');
            contenedor.innerHTML = `<h2>${titulo}</h2>` + document.getElementById(origenId).innerHTML;
            ejecutarExportacionPDF(contenedor, `reporte_${tipo}.pdf`);
        }

        function ejecutarExportacionPDF(el, name) {
            const clon = el.cloneNode(true);
            clon.style.cssText = 'padding:20px; background:white; color:black;';
            clon.querySelectorAll('button').forEach(b => b.remove());
            html2pdf().set({filename: name, jsPDF: {format: 'a4'}}).from(clon).save();
        }
        function moverSem(n) { semOff += n; render(); }
    </script>
</body>
