<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>11/9 Asistencia y Pagos</title>
    <!-- ... (Mantené los mismos scripts de Firebase y html2pdf que tenías antes) ... -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            /* Colores de alto contraste */
            --amarillo: #FFD700; /* Dorado más brillante */
            --fondo: #121212; 
            --sup: #1E1E1E;
            --borde: #444; 
            --texto: #FFFFFF; /* Texto blanco puro */
            --verde: #4CAF50; /* Verde más vivo */
            --rojo: #FF5252; /* Rojo más vivo */
            --azul: #2196F3;
        }
        
        /* ... (Mantené el resto del CSS igual, pero asegurate de que los botones tengan color: var(--texto) donde corresponda) ... */
        .btn-acc { color: #FFFFFF; font-weight: 800; }
        .tit-periodo { color: var(--amarillo); }
        
        /* Asegurando legibilidad en tablas */
        table { color: #FFFFFF; }
        .t-total { background-color: #333 !important; color: var(--amarillo) !important; }
    </style>
</head>
<body>
    <!-- ... (El resto del HTML se mantiene igual) ... -->

    <script>
        // ... (Tu lógica de Firebase y otras funciones) ...

        function generarRecibosPDF() {
            const seleccionados = Array.from(document.querySelectorAll('.chk-recibo:checked'));
            if(seleccionados.length === 0) { alert('Seleccioná a alguien'); return; }
            
            let sabadoInicial = getSabadoPrevio(new Date()); 
            sabadoInicial.setDate(sabadoInicial.getDate() + semOff * 7);
            let v = new Date(sabadoInicial); v.setDate(sabadoInicial.getDate() + 6);
            let fV = `${v.getDate().toString().padStart(2,'0')}/${(v.getMonth()+1).toString().padStart(2,'0')}/${v.getFullYear()}`;
            
            const contenedor = document.createElement('div');
            // CSS FORZADO A BLANCO Y NEGRO PARA EL PDF
            let html = `
                <style>
                    body { background-color: white !important; color: black !important; font-family: sans-serif; }
                    .recibo-card {
                        width: 100%; height: 60mm; margin-bottom: 5mm; 
                        border: 2px solid #000; padding: 5mm; box-sizing: border-box;
                        background-color: white !important; color: black !important;
                    }
                    .linea { border-bottom: 1px solid #000; font-weight: bold; display: inline-block; min-width: 50px; }
                    .titulo-recibo { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
                </style>
            `;
            
            seleccionados.forEach((chk, i) => {
                let monto = parseFloat(chk.getAttribute('data-monto')).toLocaleString('es-AR', {minimumFractionDigits:2});
                html += `
                    <div class="recibo-card">
                        <div class="titulo-recibo">Recibo de Dinero</div>
                        <table style="width:100%; font-size:12px; margin-bottom: 10px;">
                            <tr><td><b>Fecha:</b> ${fV}</td><td style="text-align:right;"><b>De:</b> IIBR Ingeniería SRL</td></tr>
                        </table>
                        <div style="margin-top:5px;"><b>Nombre:</b> <span class="linea">${chk.value}</span></div>
                        <div style="margin-top:5px;"><b>La suma de:</b> $ <span class="linea">${monto}</span></div>
                        <div style="margin-top:5px;"><b>Concepto:</b> <span class="linea">Mano de obra - Obra 11 de Septiembre</span></div>
                        <table style="width:100%; margin-top:20px; font-size:11px;">
                            <tr><td style="border-top:1px solid #000; text-align:center; width: 45%;">Firma</td><td></td><td style="border-top:1px solid #000; text-align:center; width: 45%;">DNI</td></tr>
                        </table>
                    </div>
                `;
                if((i+1)%4 === 0) html += '<div style="page-break-after:always;"></div>';
            });
            
            contenedor.innerHTML = html; 
            document.getElementById('recibos-overlay').style.display = 'none';
            
            // Configuración estricta para el PDF
            const opt = { 
                filename: `Recibos_${fV.replace(/\//g,'-')}.pdf`, 
                jsPDF: {format: 'a4', orientation: 'portrait'}, 
                html2canvas: {scale: 2, backgroundColor: '#ffffff'} 
            };
            html2pdf().set(opt).from(contenedor).save();
        }
    </script>
</body>
</html>
